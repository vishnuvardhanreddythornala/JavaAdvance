spring.application.name=API-GATEWAY
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webflux.routes[0].id=DOCTOR-SERVICE
spring.cloud.gateway.server.webflux.routes[0].uri=lb://DOCTOR-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/doctors/**

spring.cloud.gateway.server.webflux.routes[1].id=APPOINTMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[1].uri=lb://APPOINTMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/appointments/**